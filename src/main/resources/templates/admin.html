<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
background: linear-gradient(135deg, #2a0845, #6441a5, #7f5af0);
color: white;
}

/* NAVBAR */
.navbar{
background:rgba(0,0,0,0.4)!important;
backdrop-filter:blur(10px);
border-radius:10px;
margin:10px;
}

/* CARD */
.card{
border-radius:20px;
background: linear-gradient(
    135deg,
    rgba(210,180,255,0.35),
    rgba(160,120,255,0.25)
);
backdrop-filter: blur(12px);
padding:15px;
border: 1px solid rgba(255,255,255,0.15);
box-shadow: 0 8px 25px rgba(0,0,0,0.25);
transition:0.3s;
}
.card:hover{
transform:translateY(-8px);
}

/* TEXT */
.card h4, .card p, .card td, .card th{
color:white;
}

/* INPUT */
.form-control{
background: rgba(255,255,255,0.2);
border:none;
color:white;
}
.form-control::placeholder{
color:rgba(255,255,255,0.7);
}

/* BUTTONS */
.btn-warning{
background:#ffd43b !important;
color:black !important;
border:none;
}

.btn-light{
background:white !important;
color:#5a189a !important;
border:none;
}

/* TABLE */
.table{
color:white;
}

/* IMAGE */
img{
height:60px;
width:60px;
object-fit:cover;
border-radius:10px;
}

/* HOVER */
.btn:hover{
transform:scale(1.08);
}
</style>

</head>

<body>

<!-- NAVBAR -->
<nav class="navbar px-4">
<span class="fw-bold">👨‍💼 Admin Panel</span>
<div>
<a href="/menu" class="btn btn-warning">Menu</a>
<button onclick="toggleDark()" class="btn btn-light">🌙</button>
</div>
</nav>

<div class="container mt-5">

<h2 class="text-center mb-4">👨‍💼 Manage Menu</h2>

<!-- ADD ITEM -->
<div class="card mb-4">
<h4>Add New Item</h4>

<form action="/admin/add" method="post">

<input type="text" name="name" placeholder="Item Name" class="form-control mb-2" required>

<input type="number" name="price" placeholder="Price" class="form-control mb-2" required>

<input type="text" name="imageUrl" placeholder="Image URL" class="form-control mb-2" required>

<button class="btn btn-warning">Add Item</button>

</form>
</div>

<!-- VIEW ITEMS -->
<div class="card">
<h4>Menu Items</h4>

<table class="table mt-3">

<tr>
<th>Name</th>
<th>Price</th>
<th>Image</th>
</tr>

<tr th:each="item:${menuItems}">
<td th:text="${item.itemName}"></td>
<td>₹<span th:text="${item.price}"></span></td>
<td>
<img th:src="${item.imageUrl}">
</td>
<td>
<a th:href="@{/admin/edit(id=${item.menuId})}" class="btn btn-info btn-sm">Edit</a>
<a th:href="@{/admin/delete(id=${item.menuId})}" class="btn btn-danger btn-sm">Delete</a>
</td>
</tr>

</table>

</div>

</div>

<script>
function toggleDark(){
document.body.classList.toggle("dark");
}
</script>

</body>
</html>
