<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white;
}

.card {
    border-radius: 15px;
}

.table {
    background: white;
    color: black;
    border-radius: 10px;
    overflow: hidden;
}
</style>

</head>

<body>

<div class="container mt-5">

<h2 class="text-center mb-4">📊 Admin Dashboard</h2>

<!-- SUMMARY CARD -->
<div class="card p-4 mb-4 text-center shadow">

    <h4>Total Orders</h4>
    <h2 th:text="${totalOrders}"></h2>

</div>

<!-- TABLE -->
<div class="card p-3 shadow">

<table class="table table-bordered text-center">

<thead class="table-dark">
<tr>
    <th>ID</th>
    <th>Items</th>
    <th>Total</th>
    <th>Status</th>
    <th>Action</th>
</tr>
</thead>

<tbody>

<tr th:each="order : ${orders}">

    <td th:text="${order.orderId}"></td>
    <td th:text="${order.items}"></td>
    <td>₹<span th:text="${order.total}"></span></td>

    <td>
        <span class="badge bg-warning text-dark"
              th:text="${order.deliveryStatus}"></span>
    </td>

    <td>
        <a th:href="@{/admin/updateStatus(id=${order.orderId})}"
           class="btn btn-success btn-sm">
           🚚 Update
        </a>
    </td>

</tr>

</tbody>

</table>

</div>

</div>

</body>
</html>
