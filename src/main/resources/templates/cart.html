<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
background: linear-gradient(135deg, #2a0845, #6441a5, #7f5af0);
color: white;
}

/* NAVBAR */
.navbar{
background:rgba(0,0,0,0.4)!important;
backdrop-filter:blur(10px);
border-radius:10px;
margin:10px;
}

/* CARD */
.card{
border-radius:20px;
background: linear-gradient(
    135deg,
    rgba(210,180,255,0.4),
    rgba(160,120,255,0.3)
);
backdrop-filter: blur(12px);
padding:20px;
box-shadow: 0 8px 25px rgba(0,0,0,0.25);
border: 1px solid rgba(255,255,255,0.15);
}

/* LIST ITEMS FIX */
.list-group-item{
background: transparent !important;
color: white !important;
border: none;
border-bottom: 1px solid rgba(255,255,255,0.1);
}

/* BUTTONS */
.btn-warning{
background:#ffd43b !important;
color:black !important;
border:none;
}

.btn-success{
background:white !important;
color:#5a189a !important;
border:none;
}

.btn-danger{
background:#ff6b6b !important;
border:none;
}

/* TEXT */
h4{
color:white;
}

/* HOVER */
.btn:hover{
transform:scale(1.08);
}
</style>
</head>

<body>

<nav class="navbar px-4">
<span>🍔 Food Delivery</span>
<div>
<a href="/menu" class="btn btn-warning">Menu</a>
<button onclick="toggleDark()" class="btn btn-light">🌙</button>
</div>
</nav>

<div class="container mt-5">

<h2 class="text-center">🛒 Cart</h2>

<div class="card mt-4">

<ul class="list-group mb-3">
<li class="list-group-item d-flex justify-content-between"
th:each="item,iter:${cartItems}">
<span th:text="${item}"></span>
<a th:href="@{/remove(index=${iter.index})}" class="btn btn-danger">❌</a>
</li>
</ul>

<h4>Total: ₹<span th:text="${total}"></span></h4>

<form action="/payment">
<button class="btn btn-success w-100 mt-2">Proceed</button>
</form>

</div>
</div>

<script>
function toggleDark(){
document.body.classList.toggle("dark");
}
</script>

</body>
</html>
