Auto update image preview when URL changes
👉 Toast popup “Item Updated Successfully”
👉 Confirmation before delete<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>

<title>Edit Item</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
background: linear-gradient(135deg, #2a0845, #6441a5, #7f5af0);
color: white;
}

/* NAVBAR */
.navbar{
background:rgba(0,0,0,0.4)!important;
backdrop-filter:blur(10px);
border-radius:10px;
margin:10px;
}

/* CARD */
.card{
border-radius:20px;
background: linear-gradient(
    135deg,
    rgba(210,180,255,0.35),
    rgba(160,120,255,0.25)
);
backdrop-filter: blur(12px);
padding:20px;
border: 1px solid rgba(255,255,255,0.15);
box-shadow: 0 8px 25px rgba(0,0,0,0.25);
transition:0.3s;
}

/* INPUT */
.form-control{
background: rgba(255,255,255,0.2);
border:none;
color:white;
}
.form-control::placeholder{
color:rgba(255,255,255,0.7);
}

/* IMAGE PREVIEW */
img{
height:120px;
width:120px;
object-fit:cover;
border-radius:12px;
margin-bottom:10px;
}

/* BUTTON */
.btn-warning{
background:#ffd43b !important;
color:black !important;
border:none;
}

.btn-light{
background:white !important;
color:#5a189a !important;
border:none;
}

/* HOVER */
.btn:hover{
transform:scale(1.08);
}
</style>

</head>

<body>

<!-- NAVBAR -->
<nav class="navbar px-4">
<span class="fw-bold">✏️ Edit Item</span>
<div>
<a href="/admin" class="btn btn-light">Back</a>
</div>
</nav>

<div class="container mt-5">

<div class="card mx-auto" style="max-width:400px;">

<h4 class="text-center mb-3">Update Item</h4>

<form action="/admin/update" method="post">

<input type="hidden" name="id" th:value="${item.menuId}">

<!-- IMAGE PREVIEW -->
<img id="previewImg"
     th:src="${item.imageUrl != null ? item.imageUrl : 'https://via.placeholder.com/300'}"
     alt="Preview">

<input type="text" name="name"
       th:value="${item.itemName}"
       class="form-control mb-2"
       placeholder="Item Name">

<input type="number" name="price"
       th:value="${item.price}"
       class="form-control mb-2"
       placeholder="Price">

<!-- 🔄 IMAGE URL INPUT WITH LIVE UPDATE -->
<input type="text" name="imageUrl"
       th:value="${item.imageUrl}"
       class="form-control mb-3"
       placeholder="Image URL"
       oninput="updatePreview(this.value)">

<button class="btn btn-warning w-100">Update Item</button>

</form>

</div>

</div>
<script>
function updatePreview(url){
    const img = document.getElementById("previewImg");

    if(url.trim() === ""){
        img.src = "https://via.placeholder.com/300";
    } else {
        img.src = url;
    }
}
</script>

</body>
</html>
