<!DOCTYPE html>
<html>
<head>
<title>Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>
body {
    background: linear-gradient(135deg, #2a0845, #6441a5, #7f5af0);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
    color: white;
}

/* 🌙 DARK MODE */
body.dark {
    background: #121212 !important;
}

/* ✨ PARTICLES */
body::before {
    content: "";
    position: absolute;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle, rgba(180,140,255,0.15) 1px, transparent 1px);
    background-size: 40px 40px;
    animation: move 20s linear infinite;
}

@keyframes move {
    from { transform: translate(0,0);}
    to { transform: translate(-200px,-200px);}
}

/* ✨ CARD */
.card {
    width: 380px;
    padding: 30px;
    border-radius: 20px;
    backdrop-filter: blur(15px);
    background: rgba(160, 120, 255, 0.15);
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    animation: fadeIn 1s ease;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(30px);}
    to { opacity: 1; transform: translateY(0);}
}

/* INPUT */
.form-control {
    border-radius: 10px;
}

/* ICON */
.input-group-text {
    background: transparent;
    border: none;
    color: white;
}

.toggle-eye {
    cursor: pointer;
}

/* BUTTON */
.btn:hover {
    transform: scale(1.05);
}
</style>

</head>

<body>

<button onclick="toggleDark()" class="btn btn-light position-absolute top-0 end-0 m-3">🌙</button>

<div class="card text-center">

<h2 class="mb-4">🔐 Login</h2>

<form action="/login" method="post">

<div class="input-group mb-3">
    <span class="input-group-text"><i class="fa fa-envelope"></i></span>
    <input type="email" class="form-control" name="email" placeholder="Email" required>
</div>

<div class="input-group mb-3">
    <span class="input-group-text"><i class="fa fa-lock"></i></span>
    <input type="password" id="password" class="form-control" name="password" placeholder="Password" required>
    <span class="input-group-text toggle-eye" onclick="togglePassword()">
        <i class="fa fa-eye"></i>
    </span>
</div>

<button class="btn btn-dark w-100">Login</button>

</form>

<p class="mt-3">
New user? <a href="/signup" class="text-warning">Sign Up</a>
</p>

<div th:if="${param.error}" class="text-danger mt-2">
Invalid email or password
</div>

</div>

<script>
function togglePassword() {
    const pass = document.getElementById("password");
    pass.type = pass.type === "password" ? "text" : "password";
}

/* DARK MODE */
function toggleDark() {
    document.body.classList.toggle("dark");
    localStorage.setItem("theme",
        document.body.classList.contains("dark") ? "dark" : "light");
}

window.onload = function() {
    if(localStorage.getItem("theme") === "dark"){
        document.body.classList.add("dark");
    }
};
</script>

</body>
</html>
