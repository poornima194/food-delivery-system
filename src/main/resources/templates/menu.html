<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: linear-gradient(135deg, #43cea2, #185a9d);
}

.card {
    border-radius: 15px;
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-8px);
    box-shadow: 0 15px 30px rgba(0,0,0,0.3);
}

.qty-btn {
    width: 35px;
    height: 35px;
    border: none;
    background: black;
    color: white;
    border-radius: 50%;
}

.qty-btn:hover {
    background: #ff9800;
}

img {
    height: 180px;
    object-fit: cover;
}
</style>

</head>

<body>

<nav class="navbar navbar-dark bg-dark px-4">
    <span class="navbar-brand">🍔 Food Delivery</span>
    <a href="/cart" class="btn btn-warning">
        🛒 Cart (<span th:text="${cartItems.size()}"></span>)
    </a>
</nav>

<div class="container mt-4">

<h2 class="text-center text-white mb-4">🍽️ Menu</h2>

<form action="/addToCart" method="post">

<div class="row">

<div class="col-md-4 mb-4" th:each="item : ${items}">
    
    <div class="card p-3 shadow text-center">

        <img src="https://images.unsplash.com/photo-1604908176997-4319c8b8c4a2"
             class="img-fluid rounded mb-3">

        <h5 th:text="${item.itemName}" class="fw-bold"></h5>

        <p class="text-success fs-5">
            ₹<span th:text="${item.price}"></span>
        </p>

        <input type="checkbox" name="menuIds" th:value="${item.menuId}">

        <div class="d-flex justify-content-center mt-2">

            <button type="button" class="qty-btn" onclick="dec(this)">-</button>

            <!-- ✅ FIXED -->
            <input type="number"
                   th:name="'quantities[' + ${item.menuId} + ']'"
                   value="1" min="1"
                   class="mx-2 text-center form-control"
                   style="width:70px;">

            <button type="button" class="qty-btn" onclick="inc(this)">+</button>

        </div>

    </div>

</div>

</div>

<div class="text-center">
    <button class="btn btn-warning px-5">Add to Cart</button>
</div>

</form>

</div>

<script>
function inc(btn){
    let input = btn.parentElement.querySelector("input");
    input.value++;
}

function dec(btn){
    let input = btn.parentElement.querySelector("input");
    if(input.value > 1) input.value--;
}
</script>

</body>
</html>
