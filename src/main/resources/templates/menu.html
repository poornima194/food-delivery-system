<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
background: linear-gradient(135deg, #2a0845, #6441a5, #7f5af0);
color: white;
}

/* NAVBAR */
.navbar{
backdrop-filter:blur(12px);
background:rgba(0,0,0,0.4)!important;
margin:10px;
border-radius:12px;
}

/* CARD */
.card{
border-radius:20px;
background: linear-gradient(
    135deg,
    rgba(210,180,255,0.4),
    rgba(160,120,255,0.3)
);
backdrop-filter: blur(15px);
border: 1px solid rgba(255,255,255,0.15);
box-shadow: 0 8px 25px rgba(0,0,0,0.25);
transition:0.4s;
}
.card:hover{
transform:translateY(-10px) scale(1.05);
}

/* FLOAT ANIMATION */
.float{
animation:float 3s infinite;
}
@keyframes float{
0%{transform:translateY(0);}
50%{transform:translateY(-10px);}
100%{transform:translateY(0);}
}

/* IMAGE */
img{
height:180px;
width:100%;
object-fit:cover;
border-radius:12px;
transition:0.3s;
}

.card:hover img{
transform:scale(1.05);
}

/* INPUT */
.form-control{
background: rgba(255,255,255,0.2);
border: none;
color: white;
}
.form-control::placeholder{
color: rgba(255,255,255,0.7);
}

/* BUTTONS */
.btn-warning{
background:#ffd43b !important;
color:black !important;
border:none;
}

.btn-info,
.btn-success{
background:white !important;
color:#5a189a !important;
border:none;
}

.btn-light{
background:white !important;
color:#5a189a !important;
border:none;
}

/* LOGOUT BUTTON */
.btn-danger{
background:#ff6b6b !important;
border:none;
}

/* HOVER */
.btn:hover{
transform:scale(1.08);
}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar px-4">
<span class="fw-bold">
🍔 Food Delivery 
<span th:if="${session.user.role == 'ADMIN'}">👑</span>
</span>

<div class="ms-auto">

<!-- 👨‍💼 ADMIN BUTTON -->
<a th:if="${session.user.role == 'ADMIN'}"
   href="/admin"
   class="btn btn-light">Admin</a>

<a href="/cart" class="btn btn-warning">Cart</a>
<a href="/orders" class="btn btn-info">Orders</a>
<a href="/track" class="btn btn-success">Track</a>
<button onclick="toggleDark()" class="btn btn-light">🌙</button>
<a href="/logout" class="btn btn-danger">Logout</a>

</div>
</nav>

<div class="container mt-4">

<h2 class="text-center mb-4">🍽️ Menu</h2>

<form action="/addToCart" method="post">

<div class="row">

<div class="col-md-4 mb-4" th:each="item:${items}">
<div class="card p-3 text-center float">

<!-- ✅ DYNAMIC IMAGE -->
<img th:src="${item.imageUrl != null ? item.imageUrl : 'https://via.placeholder.com/300'}"
     alt="Food Image">

<h5 th:text="${item.itemName}"></h5>

<p class="text-warning">₹<span th:text="${item.price}"></span></p>

<input type="checkbox" name="menuIds" th:value="${item.menuId}">

<input type="number"
th:name="'quantities['+${item.menuId}+']'"
value="1" min="1"
class="form-control mt-2">

</div>
</div>

</div>

<div class="text-center">
<button class="btn btn-warning">Add to Cart</button>
</div>

</form>
</div>

<script>
function toggleDark(){
document.body.classList.toggle("dark");
}
</script>

</body>
</html>
