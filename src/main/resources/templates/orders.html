<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
background: linear-gradient(135deg, #2a0845, #6441a5, #7f5af0);
color: white;
}

.navbar{
background:rgba(0,0,0,0.4)!important;
backdrop-filter:blur(10px);
border-radius:10px;
margin:10px;
}

.card{
border-radius:20px;
background: linear-gradient(
    135deg,
    rgba(210,180,255,0.35),
    rgba(160,120,255,0.25)
);
backdrop-filter: blur(12px);
padding:15px;
border: 1px solid rgba(255,255,255,0.15);
box-shadow: 0 8px 25px rgba(0,0,0,0.25);
transition:0.3s;
}
.card:hover{
transform:translateY(-8px);
}

.card h6,
.card p {
color: white;
}

.btn-warning{
background:#ffd43b !important;
color:black !important;
border:none;
}

.btn-success,
.btn-info,
.btn-primary{
background:white !important;
color:#5a189a !important;
border:none;
}

.badge{
background:white !important;
color:#5a189a !important;
}

.btn:hover{
transform:scale(1.08);
}
</style>

</head>

<body>

<nav class="navbar px-4">
<span class="fw-bold">📦 Orders</span>
<div>
<a href="/menu" class="btn btn-warning">Menu</a>
<a href="/cart" class="btn btn-info">Cart</a>
<a href="/track" class="btn btn-success">Track</a>
<button onclick="toggleDark()" class="btn btn-light">🌙</button>
</div>
</nav>

<div class="container mt-5">

<h2 class="text-center mb-4">📦 Order History</h2>

<div class="row">

<div class="col-md-6 mb-3" th:each="order:${orders}">

<div class="card">

<h6>🍽️ Items</h6>

<!-- ✅ FIXED ITEM DISPLAY -->
<div>
    <p th:each="item : ${order.items}">
        <span th:text="${item.itemName}"></span> x 
        <span th:text="${item.quantity}"></span>
    </p>
</div>

<p class="text-warning">
₹<span th:text="${order.total}"></span>
</p>

<span class="badge"
th:text="${order.status}"></span>

</div>

</div>

</div>

</div>

<script>
function toggleDark(){
document.body.classList.toggle("dark");
}
</script>

</body>
</html>
