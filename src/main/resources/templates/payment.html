<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
background: linear-gradient(135deg, #2a0845, #6441a5, #7f5af0);
color: white;
}

/* NAVBAR */
.navbar{
background:rgba(0,0,0,0.4)!important;
backdrop-filter:blur(10px);
border-radius:10px;
margin:10px;
}

/* CARD */
.card{
border-radius:20px;
background: linear-gradient(
    135deg,
    rgba(210,180,255,0.4),
    rgba(160,120,255,0.3)
);
backdrop-filter: blur(15px);
box-shadow: 0 8px 25px rgba(0,0,0,0.25);
border: 1px solid rgba(255,255,255,0.15);
transition:0.4s;
}
.card:hover{
transform:scale(1.03);
}

/* TEXT FIX */
.card h2{
color:white;
}

/* BUTTONS */
.btn-warning{
background:#ffd43b !important;
color:black !important;
border:none;
}

.btn-success,
.btn-primary,
.btn-info{
background:white !important;
color:#5a189a !important;
border:none;
}

.btn:hover{
transform:scale(1.08);
}
</style>

</head>

<body>

<!-- NAVBAR -->
<nav class="navbar px-4">
<span class="fw-bold">💳 Payment</span>
<div>
<a href="/menu" class="btn btn-warning">Menu</a>
<a href="/cart" class="btn btn-info">Cart</a>
<a href="/orders" class="btn btn-primary">Orders</a>
<a href="/track" class="btn btn-success">Track</a>
<button onclick="toggleDark()" class="btn btn-light">🌙</button>
</div>
</nav>

<div class="container mt-5 text-center">

<div class="card p-4 mx-auto" style="max-width:400px;">

<h2>💳 Payment</h2>

<h4 class="text-warning mt-3">
₹<span th:text="${total}"></span>
</h4>

<form action="/order" method="post">

<select class="form-control mt-3 mb-3">
<option>UPI</option>
<option>Card</option>
<option>Cash on Delivery</option>
</select>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<button type="button" onclick="payNow()" class="btn btn-success w-100">
Pay Now
</button>

<script>
function payNow(){

    fetch('/createOrder', {method:'POST'})
    .then(res => res.json())
    .then(data => {

        var options = {
            "key": "rzp_test_SVXcXvwVu4o7PM",

            "amount": data.amount,
            "currency": "INR",
            "name": "Food Delivery",
            "description": "Order Payment",
			"order_id": data.id,

            // 🔥 ADD THIS (FORCE METHODS)
            "method": {
                "upi": true,
                "card": true,
                "netbanking": true,
                "wallet": true
            },

            // 🔥 ADD PREFILL (OPTIONAL BUT GOOD)
            "prefill": {
                "name": "Test User",
                "email": "test@example.com",
                "contact": "9999999999"
            },

            "handler": function (response){
				
				console.log(response);

                fetch('/verifyPayment', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded'
                    },
                    body: new URLSearchParams({
                        razorpay_payment_id: response.razorpay_payment_id,
                        razorpay_order_id: response.razorpay_order_id,
                        razorpay_signature: response.razorpay_signature
                    })
                })
                .then(res => res.text())
                .then(data => {

                    if(data === "success"){
                        alert("Payment Verified & Order Placed!");
                        window.location.href = "/orders";
                    } else {
                        alert("Payment verification failed!");
                    }
                });
            }
        };

        var rzp = new Razorpay(options);
        rzp.open();
    });
}
</script>

</form>

</div>

</div>

<script>
function toggleDark(){
document.body.classList.toggle("dark");
}
</script>

</body>
</html>
