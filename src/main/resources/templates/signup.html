<!DOCTYPE html>
<html>
<head>
<title>Register</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>
body{
background: linear-gradient(135deg, #2a0845, #6441a5, #7f5af0);
height: 100vh;
display: flex;
justify-content: center;
align-items: center;
overflow: hidden;
color: white;
}

body.dark{ background: #121212 !important; }

/* CARD */
.card {
    width: 380px;
    padding: 30px;
    border-radius: 20px;
    backdrop-filter: blur(15px);
    background: rgba(160, 120, 255, 0.15);
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    animation: fadeIn 1s ease;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(30px);}
    to { opacity: 1; transform: translateY(0);}
}

.input-group-text {
    background: transparent;
    border: none;
    color: white;
}

.btn:hover {
    transform: scale(1.05);
}
</style>

</head>

<body>

<button onclick="toggleDark()" class="btn btn-light position-absolute top-0 end-0 m-3">🌙</button>

<div class="card text-center">

<h2 class="mb-4">📝 Register</h2>

<form action="/register" method="post" onsubmit="return validateForm()">

<div class="input-group mb-3">
    <span class="input-group-text"><i class="fa fa-user"></i></span>
    <input class="form-control" name="name" placeholder="Full Name" required>
</div>

<div class="input-group mb-3">
    <span class="input-group-text"><i class="fa fa-envelope"></i></span>
    <input class="form-control" name="email" placeholder="Email" required>
</div>

<div class="input-group mb-3">
    <span class="input-group-text"><i class="fa fa-lock"></i></span>
    <input type="password" id="pass" class="form-control" name="password" placeholder="Password" required>
</div>

<div id="error" class="text-danger mb-2"></div>

<button class="btn btn-dark w-100">Register</button>

</form>

<p class="mt-3">
Already have account? <a href="/" class="text-warning">Login</a>
</p>

</div>

<script>
function validateForm() {
    const pass = document.getElementById("pass").value;

    if (pass.length < 6) {
        document.getElementById("error").innerText = "Password must be at least 6 characters";
        return false;
    }
    return true;
}

/* DARK MODE */
function toggleDark() {
    document.body.classList.toggle("dark");
    localStorage.setItem("theme",
        document.body.classList.contains("dark") ? "dark" : "light");
}

window.onload = function() {
    if(localStorage.getItem("theme") === "dark"){
        document.body.classList.add("dark");
    }
};
</script>

</body>
</html>
