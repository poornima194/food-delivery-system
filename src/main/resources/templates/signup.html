<!DOCTYPE html>
<html>
<head>
<title>Register</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>
body {
    background: linear-gradient(135deg, #ff758c, #ff7eb3);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.card {
    width: 380px;
    padding: 30px;
    border-radius: 20px;
    backdrop-filter: blur(15px);
    background: rgba(255,255,255,0.2);
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
}

.input-group-text {
    background: transparent;
    border: none;
    color: white;
}
</style>

</head>

<body>

<div class="card text-center">

<h2 class="text-white mb-4">📝 Register</h2>

<form action="/register" method="post" onsubmit="return validateForm()">

<div class="input-group mb-3">
    <span class="input-group-text"><i class="fa fa-user"></i></span>
    <input class="form-control" name="name" placeholder="Full Name" required>
</div>

<div class="input-group mb-3">
    <span class="input-group-text"><i class="fa fa-envelope"></i></span>
    <input class="form-control" name="email" placeholder="Email" required>
</div>

<div class="input-group mb-3">
    <span class="input-group-text"><i class="fa fa-lock"></i></span>
    <input type="password" id="pass" class="form-control" name="password" placeholder="Password" required>
</div>

<div id="error" class="text-danger mb-2"></div>

<button class="btn btn-dark w-100">Register</button>

</form>

<p class="mt-3 text-white">
Already have account? <a href="/" class="text-warning">Login</a>
</p>

</div>

<script>
function validateForm() {
    const pass = document.getElementById("pass").value;

    if (pass.length < 6) {
        document.getElementById("error").innerText = "Password must be at least 6 characters";
        return false;
    }
    return true;
}
</script>

</body>
</html>
