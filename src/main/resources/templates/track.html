<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
background: linear-gradient(135deg, #2a0845, #6441a5, #7f5af0);
color: white;
}

.navbar{
background:rgba(0,0,0,0.4)!important;
backdrop-filter:blur(10px);
border-radius:10px;
margin:10px;
}

.card{
border-radius:20px;
background: linear-gradient(
    135deg,
    rgba(210,180,255,0.35),
    rgba(160,120,255,0.25)
);
backdrop-filter: blur(12px);
padding:15px;
border: 1px solid rgba(255,255,255,0.15);
box-shadow: 0 8px 25px rgba(0,0,0,0.25);
}

.progress{
background: rgba(255,255,255,0.2);
border-radius:10px;
}

.progress-bar{
background: linear-gradient(90deg,#ffd43b,#ff9f1c);
}

[id^="map-"]{
height:250px;
border-radius:12px;
margin-top:10px;
}
</style>

</head>

<body>

<nav class="navbar px-4">
<span class="fw-bold">🚚 Tracking</span>
<div>
<a href="/menu" class="btn btn-warning">Menu</a>
<a href="/cart" class="btn btn-info">Cart</a>
<a href="/orders" class="btn btn-primary">Orders</a>
</div>
</nav>

<div class="container mt-5">

<h2 class="text-center mb-4">🚚 Track Orders</h2>

<div class="row">

<!-- 🔥 LOOP -->
<div class="col-md-6 mb-3" th:each="order : ${orders}">

<div class="card">

<h6>🍽️ Items</h6>
<p th:each="item : ${order.items}">
    <span th:text="${item.itemName}"></span> x 
    <span th:text="${item.quantity}"></span>
</p>

<h6>Status</h6>
<span class="badge" th:text="${order.deliveryStatus}"></span>

<!-- PROGRESS -->
<div class="mt-3">
<div class="progress" style="height:10px;">
<div class="progress-bar"
     th:style="'width:' + ${order.progress} + '%'">
</div>
</div>
</div>

<!-- LIVE LABEL -->
<p th:if="${order.deliveryStatus == 'Out for Delivery'}"
   class="mt-2 text-warning">
   🚚 Live tracking active
</p>

<!-- 🔥 FIXED MAP ID -->
<div th:id="'map-' + ${order.orderId}"
     th:attr="data-status=${order.deliveryStatus}">
</div>

</div>

</div>

</div>

</div>

<script>
function initMaps() {

    let maps = document.querySelectorAll('[id^="map-"]');

    maps.forEach((mapDiv) => {

        let status = mapDiv.getAttribute("data-status");

        // 📍 Fake realistic route (multiple points = curved feel)
        let path = [
            {lat: 17.3850, lng: 78.4867},
            {lat: 17.3865, lng: 78.4885},
            {lat: 17.3880, lng: 78.4905},
            {lat: 17.3900, lng: 78.4930},
            {lat: 17.3925, lng: 78.4960},
            {lat: 17.3950, lng: 78.5000}
        ];

        let map = new google.maps.Map(mapDiv, {
            zoom: 13,
            center: path[0]
        });

        // 🔵 BLUE ROUTE LINE
        let route = new google.maps.Polyline({
            path: path,
            geodesic: true,
            strokeColor: "#007bff",
            strokeOpacity: 1.0,
            strokeWeight: 4
        });
        route.setMap(map);

        // 📍 START PIN
        new google.maps.Marker({
            position: path[0],
            map: map,
            label: "S"
        });

        // 📍 DESTINATION PIN
        new google.maps.Marker({
            position: path[path.length - 1],
            map: map,
            label: "D"
        });

        // 🚚 DELIVERY ICON
        let marker = new google.maps.Marker({
            position: path[0],
            map: map,
            icon: {
                url: "https://cdn-icons-png.flaticon.com/512/2972/2972185.png",
                scaledSize: new google.maps.Size(35, 35)
            }
        });

        // 🚨 STATUS LOGIC
        if(status === "Preparing"){
            marker.setPosition(path[0]);
        }

        else if(status === "Out for Delivery"){

            let i = 0;

            function moveSmooth() {
                if (i < path.length - 1) {

                    let start = path[i];
                    let end = path[i + 1];

                    let step = 0;
                    let steps = 50; // smoothness

                    let interval = setInterval(() => {

                        step++;

                        let lat = start.lat + (end.lat - start.lat) * (step / steps);
                        let lng = start.lng + (end.lng - start.lng) * (step / steps);

                        let pos = {lat: lat, lng: lng};

                        marker.setPosition(pos);
                        map.panTo(pos);

                        if (step >= steps) {
                            clearInterval(interval);
                            i++;
                            moveSmooth(); // next segment
                        }

                    }, 50); // speed

                }
            }

            moveSmooth();
        }

        else if(status === "Delivered"){
            marker.setPosition(path[path.length - 1]);
            map.setCenter(path[path.length - 1]);
        }

    });
}
</script>

<!-- 🔑 PUT YOUR REAL API KEY -->
<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDZVecKghCazdlCh2q4upZsQdkQwcYhJ90&callback=initMaps" async defer></script>

</body>
</html>
